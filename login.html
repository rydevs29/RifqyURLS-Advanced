<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RifqyURL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background-color: #020617;
            color: #f8fafc; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8);
        }
        .fade-in { animation: fadeIn 0.6s ease-out forwards; opacity: 0; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 relative overflow-hidden">
    
    <div class="fixed top-20 left-10 w-72 h-72 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-20 right-10 w-72 h-72 bg-purple-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md glass-card p-10 rounded-[2rem] text-center relative z-10 fade-in">
        <i class="fa-solid fa-link text-5xl text-blue-500 mb-4 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
        <h1 class="text-3xl font-extrabold text-white mb-2">Rifqy<span class="text-blue-500">URL</span></h1>
        <p class="text-slate-400 text-sm mb-8">Masuk ke dalam benteng untuk mengelola link Anda secara permanen.</p>

        <div class="space-y-4">
            <button onclick="loginGoogle()" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-bold py-3.5 rounded-xl transition-all shadow-lg flex justify-center items-center gap-3">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                Lanjutkan dengan Google
            </button>
            
            <button onclick="loginMicrosoft()" class="w-full bg-[#2F2F2F] hover:bg-[#1f1f1f] border border-slate-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg flex justify-center items-center gap-3">
                <img src="https://www.svgrepo.com/show/452062/microsoft.svg" class="w-5 h-5" alt="Microsoft">
                Lanjutkan dengan Microsoft
            </button>

            <div class="flex items-center my-6">
                <div class="flex-1 border-t border-slate-700"></div>
                <span class="px-4 text-xs text-slate-500 font-bold uppercase tracking-wider">Atau</span>
                <div class="flex-1 border-t border-slate-700"></div>
            </div>

            <a href="/guest" class="block w-full bg-transparent hover:bg-slate-800 border border-slate-600 text-slate-300 hover:text-white font-bold py-3 rounded-xl transition-all">
                Masuk Sebagai Tamu (Guest)
            </a>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
