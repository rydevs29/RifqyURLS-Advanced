<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | RifqyURL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="flex flex-col items-center justify-center p-4 min-h-screen relative">
    
    <div class="fixed top-20 left-10 w-72 h-72 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <div class="w-full max-w-md glass-card p-10 rounded-[2rem] text-center relative z-10 fade-in">
        <i class="fa-solid fa-link text-5xl text-blue-500 mb-4 drop-shadow-[0_0_15px_rgba(59,130,246,0.5)]"></i>
        <h1 class="text-3xl font-extrabold text-white mb-2">Rifqy<span class="text-blue-500">URL</span></h1>
        <p class="text-slate-400 text-sm mb-8">Masuk ke dalam benteng untuk mengelola link Anda secara permanen.</p>

        <div class="space-y-4">
            <button onclick="loginGoogle()" class="w-full bg-white hover:bg-slate-100 text-slate-900 font-bold py-3.5 rounded-xl transition-all shadow-lg flex justify-center items-center gap-3">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                Lanjutkan dengan Google
            </button>
            
            <button onclick="loginMicrosoft()" class="w-full bg-[#2F2F2F] hover:bg-[#1f1f1f] border border-slate-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg flex justify-center items-center gap-3">
                <img src="https://www.svgrepo.com/show/452062/microsoft.svg" class="w-5 h-5" alt="Microsoft">
                Lanjutkan dengan Microsoft
            </button>

            <div class="flex items-center my-6">
                <div class="flex-1 border-t border-slate-700"></div>
                <span class="px-4 text-xs text-slate-500 font-bold uppercase">Atau</span>
                <div class="flex-1 border-t border-slate-700"></div>
            </div>

            <a href="/guest.html" class="block w-full bg-transparent hover:bg-slate-800 border-2 border-slate-700 text-slate-300 font-bold py-3 rounded-xl transition-all">
                Masuk Sebagai Tamu (Guest)
            </a>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
